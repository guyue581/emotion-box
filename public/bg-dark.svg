  <circle cx="500" cy="800" r="120" fill="#f093fb" opacity="0.1" filter="url(#blur)"/>
  <circle cx="100" cy="700" r="80" fill="#4facfe" opacity="0.1" filter="url(#blur)"/>
  <circle cx="900" cy="900" r="90" fill="#00f2fe" opacity="0.1" filter="url(#blur)"/>
